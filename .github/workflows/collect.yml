name: Collect leads

on:
  schedule:
    # Every 20 minutes. Note: GitHub's scheduler is best-effort and can lag
    # 5-20 minutes at peak times, so don't build anything that assumes exact
    # timing. If you need reliable sub-hour freshness, run this on a cheap VPS
    # cron instead and keep Actions as the backup.
    - cron: "*/20 * * * *"
  workflow_dispatch:        # run it by hand from the Actions tab
  push:
    branches: [main]
    paths:
      - "config/**"         # re-run when you tune queries or weights
      - "pipeline/**"

permissions:
  contents: write           # required to commit data/leads.json back

concurrency:
  group: collect
  cancel-in-progress: false # let a run finish rather than corrupting a commit

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Optional. Without it the run is rules-only and still works.
          # Add at: Settings -> Secrets and variables -> Actions.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.run

      - name: Commit results
        run: |
          git config user.name "loss-radar-bot"
          git config user.email "actions@github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No new leads this run."
          else
            git commit -m "leads: $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Another run may have landed while this one was working.
            git pull --rebase --autostash origin main || true
            git push
          fi
